```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart - Zesto</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="logo">Ze<span>sto</span></div>

  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="menu.html">Menu</a></li>
    <li><a href="#" class="active">Cart</a></li>
  </ul>
</nav>

<div class="menu-hero">
  <h1>Your Cart 🛒</h1>
  <p>Review your order before checkout</p>
</div>

<section class="section">

  <div id="cartItems"></div>

  <div class="promo-banner" style="margin-top:20px;">
    <div class="promo-text">
      <p class="promo-title">Order Summary</p>
      <p id="itemCount">0 Items</p>
      <h2 id="totalAmount">₹0</h2>
    </div>

    <button class="promo-cta" onclick="checkout()">
      Place Order
    </button>
  </div>

</section>

<script>

function loadCart() {

  const cart =
    JSON.parse(localStorage.getItem("cart")) || [];

  const cartItems =
    document.getElementById("cartItems");

  let total = 0;

  cartItems.innerHTML = "";

  if(cart.length === 0){

    cartItems.innerHTML = `
      <div class="cart-empty">
        <span class="cart-empty-emoji">🛒</span>
        <p>Your cart is empty</p>
      </div>
    `;

    return;
  }

  cart.forEach((item,index)=>{

    total += item.price;

    cartItems.innerHTML += `
      <div class="cart-item">

        <div class="cart-item-info">

          <div class="cart-item-emoji">
            ${item.emoji || "🍽️"}
          </div>

          <div>
            <div class="cart-item-name">
              ${item.name}
            </div>

            <div class="cart-item-price">
              ₹${item.price}
            </div>
          </div>

        </div>

        <button
          class="qty-btn"
          onclick="removeItem(${index})">
          ✕
        </button>

      </div>
    `;
  });

  document.getElementById("totalAmount")
    .innerText = `₹${total}`;

  document.getElementById("itemCount")
    .innerText = `${cart.length} Items`;
}

function removeItem(index){

  let cart =
    JSON.parse(localStorage.getItem("cart")) || [];

  cart.splice(index,1);

  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );

  loadCart();
}

async function checkout(){

  const cart =
    JSON.parse(localStorage.getItem("cart")) || [];

  if(cart.length === 0){
    alert("Cart is empty");
    return;
  }

  const customerName =
    prompt("Enter Your Name");

  if(!customerName) return;

  const totalPrice =
    cart.reduce(
      (sum,item)=>sum+item.price,
      0
    );

  const orderData = {

    customerName,

    items: cart.map(item => ({
      name: item.name,
      price: item.price,
      quantity: 1
    })),

    totalPrice

  };

  const response =
    await fetch("/api/orders",{

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify(orderData)

    });

  if(response.ok){

    alert(
      "🎉 Order Placed Successfully"
    );

    localStorage.removeItem("cart");

    window.location.reload();
  }
}

loadCart();

</script>

</body>
</html>
```
